<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tantan — знакомства</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }
        #app {
            max-width: 390px;
            width: 100%;
            height: 780px;
            background: #111122;
            border-radius: 36px;
            padding: 10px 12px 12px;
            color: #f0eef7;
            border: 1px solid #222244;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0 8px;
            flex-shrink: 0;
        }
        .top-bar .time {
            font-size: 13px;
            font-weight: 600;
            color: #c8c0e0;
            letter-spacing: 0.3px;
        }
        .top-bar .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d, #ff3b7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .top-bar .icons {
            display: flex;
            gap: 14px;
            font-size: 16px;
            color: #8880aa;
        }
        .top-bar .icons span {
            cursor: pointer;
            transition: 0.2s;
        }
        .top-bar .icons span:hover {
            color: #d0c8f0;
        }

        .hidden {
            display: none !important;
        }

        /* ----- СЦЕНА 1: ВЫБОР ПОЛА И СТИЛЯ ----- */
        #scene1 {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            gap: 6px;
        }

        .gender-selector {
            flex-shrink: 0;
            text-align: center;
            padding: 2px 0;
        }
        .gender-selector .label {
            font-size: 16px;
            font-weight: 600;
            color: #b0a8d0;
            margin-bottom: 6px;
            display: block;
        }
        .gender-selector .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .gender-selector .btn-group button {
            padding: 8px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            color: #9088b0;
            flex: 1;
            max-width: 140px;
        }
        .gender-selector .btn-group button:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .gender-selector .btn-group button.active-male {
            border-color: #4a8af4;
            background: rgba(74, 138, 244, 0.15);
            color: #8ab8ff;
        }
        .gender-selector .btn-group button.active-female {
            border-color: #ff4d8a;
            background: rgba(255, 77, 138, 0.15);
            color: #ff8aad;
        }

        .avatar-display {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a18;
            position: relative;
        }
        .avatar-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        .avatar-display .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #3a3a5a;
            background: #0a0a18;
        }

        .style-selector {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 2px 0 4px;
        }
        .style-selector button {
            flex: 1;
            padding: 10px 8px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #9088b0;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            max-width: 100px;
        }
        .style-selector button .icon {
            font-size: 22px;
            line-height: 1.2;
        }
        .style-selector button .label {
            font-size: 10px;
            color: #6a6290;
        }
        .style-selector button:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .style-selector button.active {
            border-color: #ff4d8a;
            background: rgba(255, 77, 138, 0.08);
            color: #fff;
        }
        .style-selector button.active .label {
            color: #ff8aad;
        }

        .next-btn-wrap {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            padding: 2px 0;
        }
        .next-btn-wrap button {
            padding: 10px 40px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: #4a6aaa;
            color: white;
            width: 100%;
            max-width: 200px;
            opacity: 0.4;
            pointer-events: none;
        }
        .next-btn-wrap button.enabled {
            opacity: 1;
            pointer-events: auto;
            background: #ff4d8a;
        }
        .next-btn-wrap button.enabled:hover {
            background: #e63a77;
            transform: scale(1.02);
        }
        .next-btn-wrap button.enabled:active {
            transform: scale(0.97);
        }

        /* ----- СЦЕНА 2: ПОИСК ----- */
        #scene2 {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .tinder-card-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            background: #0d0d20;
            position: relative;
            min-height: 0;
        }

        .tinder-photo {
            flex: 1;
            position: relative;
            min-height: 0;
            background: #0a0a18;
        }
        .tinder-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .tinder-counter {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 4;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #ff4d8a;
            border: 1px solid rgba(255,77,138,0.3);
        }

        .tinder-info {
            position: relative;
            z-index: 3;
            padding: 16px 16px 12px;
            background: linear-gradient(to top, rgba(13,13,32,0.98) 0%, rgba(13,13,32,0.9) 100%);
            flex-shrink: 0;
        }
        .tinder-info .name-age {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        .tinder-info .desc {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .tinder-info .desc .badge {
            background: rgba(255,77,138,0.15);
            backdrop-filter: blur(10px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ff8aad;
            border: 1px solid rgba(255,77,138,0.25);
            white-space: nowrap;
        }
        .tinder-info .desc .job-badge {
            color: #a0c4ff;
        }
        .tinder-info .desc .city-badge {
            color: #80e0a0;
        }

        .tinder-actions {
            position: relative;
            z-index: 5;
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            padding: 12px 16px 16px;
            background: rgba(13,13,32,0.95);
            flex-shrink: 0;
        }
        .tinder-actions button {
            height: 56px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .tinder-actions .btn-dislike {
            width: 56px;
            background: rgba(20,20,40,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.15);
            color: #ff6b6b;
        }
        .tinder-actions .btn-dislike:active {
            transform: scale(0.9);
            background: rgba(255,80,80,0.2);
        }
        .tinder-actions .btn-like {
            width: 56px;
            background: linear-gradient(135deg, #ff4d8a, #ff6b9d);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .tinder-actions .btn-like:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, #e63a77, #ff5288);
        }
        .tinder-actions .btn-chat {
            width: auto;
            border-radius: 30px;
            padding: 0 28px;
            font-size: 15px;
            font-weight: 700;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255,255,255,0.2);
            color: #fff;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .tinder-actions .btn-chat:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.15);
        }

        /* ----- СЦЕНА 3: ПЕРЕПИСКА ----- */
        .chat-container {
            background: #0e0e22;
            border-radius: 14px;
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid #2a2a4a;
            scroll-behavior: smooth;
            min-height: 0;
        }
        .chat-container::-webkit-scrollbar { width: 3px; }
        .chat-container::-webkit-scrollbar-track { background: #0a0a1a; border-radius: 10px; }
        .chat-container::-webkit-scrollbar-thumb { background: #4a4a7a; border-radius: 10px; }
        .message {
            max-width: 80%;
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            animation: msgAppear 0.2s ease;
        }
        .message.mine { background: #4a6a9a; align-self: flex-end; border-bottom-right-radius: 3px; }
        .message.theirs { background: #222248; align-self: flex-start; border-bottom-left-radius: 3px; }

        .chat-reply-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .chat-reply-buttons button {
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            background: #1a1a3e;
            border: 1.5px solid #3a3a5e;
            font-weight: 500;
            font-size: 15px;
            min-width: unset;
            flex: none;
            border-radius: 14px;
            box-shadow: none;
            color: #d0c8f0;
            cursor: pointer;
            transition: 0.15s ease;
            line-height: 1.4;
        }
        .chat-reply-buttons button:hover { background: #222252; border-color: #4a4a7e; }
        .chat-reply-buttons button:active { transform: scale(0.97); background: #2a2a52; border-color: #ff4d8a; }

        /* ----- СЦЕНА 4: ЛОКАЦИИ ----- */
        .catalog-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px 0;
            flex: 1;
            overflow-y: auto;
            max-height: none;
            padding: 0 2px;
        }
        .catalog-grid::-webkit-scrollbar { width: 3px; }
        .catalog-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .catalog-grid::-webkit-scrollbar-thumb { background: rgba(255,77,138,0.3); border-radius: 10px; }
        .catalog-item {
            background: #16163a;
            padding: 12px 14px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1.5px solid #2a2a4e;
            cursor: pointer;
            transition: 0.2s ease;
            flex-shrink: 0;
            min-height: 70px;
        }
        .catalog-item:hover { background: #1e1e48; border-color: #3a3a5e; }
        .catalog-item:active { transform: scale(0.98); background: #222250; }
        .catalog-item img {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            object-fit: cover;
            background: #2a2a4a;
            border: 2px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .catalog-item .info { flex: 1; min-width: 0; }
        .catalog-item .info h4 { font-size: 15px; color: #e0d8f0; font-weight: 700; margin-bottom: 4px; }
        .catalog-item .info p { font-size: 12px; color: #9088b0; line-height: 1.3; }
        .catalog-item .location-icon { font-size: 24px; margin-left: auto; opacity: 0.5; transition: 0.2s; }
        .catalog-item:hover .location-icon { opacity: 0.8; }
        .catalog-item.selected {
            border: 2px solid #ff4d8a;
            background: #1e1e4a;
            box-shadow: 0 0 20px rgba(255,77,138,0.15);
        }
        .catalog-item.selected .location-icon { opacity: 1; color: #ff4d8a; }

        /* ----- СЦЕНА 5: СВИДАНИЕ ----- */
        #scene5 {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            background: #0d0d20;
            border: none;
            margin: -10px -12px -12px;
            padding: 12px 12px 12px;
            width: calc(100% + 24px);
        }

        .date-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            z-index: 0;
        }

        .date-top {
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            padding: 8px 4px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(13,13,32,0.95) 50%, transparent);
        }
        .date-top .partner-name { font-weight: 700; font-size: 24px; color: #fff; letter-spacing: 0.5px; }
        .date-top .affection-wrap { display: flex; align-items: center; gap: 8px; }
        .date-top .affection-wrap .bar { width: 80px; height: 5px; background: rgba(255,255,255,0.12); border-radius: 20px; overflow: hidden; }
        .date-top .affection-wrap .bar .fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #ff4d8a, #ff6b9d);
            border-radius: 20px;
            transition: width 0.4s ease;
        }
        .date-top .affection-wrap .label { font-size: 16px; font-weight: 700; color: #ff4d8a; min-width: 36px; text-align: right; }

        .date-chat {
            position: relative;
            z-index: 2;
            flex: 0 1 auto;
            overflow-y: auto;
            padding: 4px 4px 2px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 180px;
            min-height: 80px;
            scroll-behavior: smooth;
        }
        .date-chat::-webkit-scrollbar { width: 3px; }
        .date-chat::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .date-chat::-webkit-scrollbar-thumb { background: rgba(255,77,138,0.3); border-radius: 10px; }

        .date-msg {
            max-width: 88%;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
            animation: msgAppear 0.3s ease;
            word-break: break-word;
        }
        @keyframes msgAppear {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .date-msg.theirs {
            background: rgba(255,255,255,0.07);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
            color: #e8e4f0;
            backdrop-filter: blur(8px);
        }
        .date-msg.mine {
            background: #ff4d8a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #fff;
        }
        .date-msg.system {
            background: rgba(255,77,138,0.1);
            border: 1px solid rgba(255,77,138,0.15);
            align-self: center;
            color: #ff8aad;
            font-size: 12px;
            border-radius: 40px;
            padding: 4px 14px;
            max-width: 92%;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .date-choices {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 3px;
            align-self: flex-start;
            width: 100%;
            max-width: 88%;
        }
        .date-choices button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 6px 12px;
            border-radius: 60px;
            color: #d0c8f0;
            font-size: 12px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: 0.15s ease;
            width: 100%;
            backdrop-filter: blur(8px);
        }
        .date-choices button:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .date-choices button.primary-choice { background: #ff4d8a; border-color: #ff4d8a; color: #fff; }
        .date-choices button.primary-choice:active { background: #e63a77; }

        .date-bottom-avatar {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px 4px 4px;
            margin-top: auto;
            background: linear-gradient(0deg, rgba(13,13,32,0.90) 10%, transparent);
            min-height: 280px;
            max-height: 460px;
        }
        .date-bottom-avatar .avatar-wrap { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .date-bottom-avatar .avatar-wrap img {
            width: 100%;
            max-width: 300px;
            height: 100%;
            max-height: 440px;
            aspect-ratio: 9/16;
            object-fit: cover;
            border-radius: 14px;
            background: transparent;
            box-shadow: none;
            border: none;
        }

        .btn-reset {
            position: relative;
            z-index: 3;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 5px 18px;
            border-radius: 60px;
            font-weight: 500;
            color: #9088b0;
            font-size: 12px;
            cursor: pointer;
            flex: 0 0 auto;
            backdrop-filter: blur(8px);
            margin: 2px auto 6px;
            transition: 0.2s;
        }
        .btn-reset:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }

        /* ----- СЦЕНА 6: КОМНАТА (ПОЛНОСТЬЮ ПЕРЕДЕЛАНА) ----- */
        #scene6 {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            background: #1a0a1a;
            border: none;
            margin: -10px -12px -12px;
            padding: 0;
            width: calc(100% + 24px);
        }

        /* Фон — картинка комнаты */
        .room-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }
        /* Затемнение для читаемости текста */
        .room-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                180deg,
                rgba(10, 5, 15, 0.6) 0%,
                rgba(20, 10, 30, 0.4) 30%,
                rgba(20, 10, 30, 0.4) 70%,
                rgba(10, 5, 15, 0.85) 100%
            );
            z-index: 1;
            pointer-events: none;
        }

        /* Контент поверх фона */
        .room-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 12px 0;
            min-height: 0;
        }

        /* Верхняя плашка с именем */
        .room-top-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255,77,138,0.15);
            flex-shrink: 0;
            margin-bottom: 8px;
        }
        .room-top-bar .room-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff4d8a;
            flex-shrink: 0;
        }
        .room-top-bar .room-info-text {
            flex: 1;
            min-width: 0;
        }
        .room-top-bar .room-partner-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .room-top-bar .room-status {
            font-size: 11px;
            color: #ff8aad;
            font-weight: 500;
        }
        .room-top-bar .room-hearts {
            font-size: 18px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        /* Чат с диалогами — прокручиваемый */
        .room-chat {
            flex: 1;

                                { theirs: 'Привет! Как настроение? 😊', replies: ['Отличное! А твоё?', 'Нормально, а у тебя?', 'Супер! Давно хотел написать 😉'] },
                                { theirs: 'У меня тоже хорошо! Чем занимаешься?', replies: ['Смотрю кино, скучно одному 😅', 'Работаю над проектом', 'Думаю о тебе 😊'] },
                                { theirs: 'Ого! Может встретимся?', replies: ['Да, давай! Когда?', 'А куда пойдём?', 'Я только ЗА! ❤️'] }
                            ],
                            female: [
                                { theirs: 'Привет! Как твои дела? 😊', replies: ['Привет! Всё супер! 😊', 'Нормально, а ты как?', 'Отлично! Ждала твоего сообщения 💕'] },
                                { theirs: 'Я рад! Что делаешь?', replies: ['Смотрю сериал, скучаю 😅', 'Готовлю ужин', 'Думаю о нашей встрече 😉'] },
                                { theirs: 'Круто! Может увидимся?', replies: ['С удовольствием! Где?', 'Давай! Когда тебе удобно?', 'Я только ЗА! ❤️'] }
                            ]
                        },
                        roomDialogs: roomDialogs
                    };
                }
            }

            let state = {
                step: 1, gender: null, style: 'style1', likedIndex: 0, likedList: [],
                currentPartner: null, selectedLocationIndex: 0, affection: 50,
                dialogIndex: 0, chatStep: 0, chatDone: false,
                roomDialogIndex: 0, roomAffection: 100
            };

            const scenes = {
                scene1: document.getElementById('scene1'), scene2: document.getElementById('scene2'),
                scene3: document.getElementById('scene3'), scene4: document.getElementById('scene4'),
                scene5: document.getElementById('scene5'), scene6: document.getElementById('scene6')
            };
            const mainTopBar = document.getElementById('mainTopBar');

            function showScene(id) {
                Object.keys(scenes).forEach(k => scenes[k].classList.toggle('hidden', k !== id));
                if (id === 'scene5' || id === 'scene6') {
                    mainTopBar.style.display = 'none';
                    document.getElementById('app').style.borderRadius = '0';
                    document.getElementById('app').style.border = 'none';
                    document.getElementById('app').style.boxShadow = 'none';
                    document.getElementById('app').style.padding = '0';
                    document.getElementById('app').style.background = id === 'scene6' ? '#1a0a1a' : '#0d0d20';
                } else {
                    mainTopBar.style.display = 'flex';
                    document.getElementById('app').style.borderRadius = '36px';
                    document.getElementById('app').style.border = '1px solid #222244';
                    document.getElementById('app').style.boxShadow = '0 20px 60px rgba(0,0,0,0.95)';
                    document.getElementById('app').style.padding = '10px 12px 12px';
                    document.getElementById('app').style.background = '#111122';
                }
            }

            function getPartners() { return gameData?.partners[state.gender==='male'?'male':'female']; }
            function getDialogs() { return gameData?.dialogs[state.gender==='male'?'male':'female']; }
            function getChatFlow() { return gameData?.chatFlow[state.gender==='male'?'male':'female']; }
            function getLocations() { return gameData?.locations || defaultLocations; }
            function getRoomDialogs() { return gameData?.roomDialogs?.[state.gender==='male'?'male':'female'] || roomDialogs.male; }

            // ---------- СЦЕНА 1 ----------
            const mainAvatar = document.getElementById('mainAvatar');
            const toScene2Btn = document.getElementById('toScene2');
            const styleImgs = {
                male:{style1:'assets/boy1.png',style2:'assets/boy2.png',style3:'assets/boy3.png'},
                female:{style1:'assets/girl1.png',style2:'assets/girl2.png',style3:'assets/girl3.png'}
            };
            function updateAvatar() {
                if(!state.gender||!state.style)return;
                mainAvatar.src = styleImgs[state.gender]?.[state.style] || '';
                mainAvatar.style.display='block';
                mainAvatar.nextElementSibling.style.display='none';
            }
            document.querySelectorAll('#scene1 .gender-selector button').forEach(b=>b.addEventListener('click',function(){
                state.gender=this.dataset.gender;
                document.querySelectorAll('#scene1 .gender-selector button').forEach(x=>x.classList.remove('active-male','active-female'));
                this.classList.add(state.gender==='male'?'active-male':'active-female');
                updateAvatar(); checkEnabled();
            }));
            document.querySelectorAll('#scene1 .style-selector button').forEach(b=>b.addEventListener('click',function(){
                document.querySelectorAll('#scene1 .style-selector button').forEach(x=>x.classList.remove('active'));
                this.classList.add('active'); state.style=this.dataset.style;
                updateAvatar(); checkEnabled();
            }));
            function checkEnabled(){
                if(state.gender&&state.style){toScene2Btn.classList.add('enabled');toScene2Btn.disabled=false;}
                else{toScene2Btn.classList.remove('enabled');toScene2Btn.disabled=true;}
            }
            toScene2Btn.addEventListener('click',()=>{
                if(!state.gender||!state.style)return;
                state.step=2;state.likedIndex=0;state.likedList=[];
                document.getElementById('matchCount').textContent='0';
                showScene('scene2'); renderTinder();
            });

            // ---------- СЦЕНА 2 ----------
            function renderTinder(){
                const p = getPartners(); if(!p?.length) return;
                const partner = p[state.likedIndex % p.length];
                document.getElementById('tinderAvatar').src = partner.avatar || '';
                document.getElementById('tinderName').textContent = `${partner.name||'?'}, ${partner.age||'?'}`;
                let d=''; if(partner.job)d+=`<span class="job-badge">💼 ${partner.job}</span>`;
                if(partner.zodiac)d+=`<span class="badge">${partner.zodiac}</span>`;
                if(partner.city)d+=`<span class="city-badge">📍 ${partner.city}</span>`;
                document.getElementById('tinderDesc').innerHTML = d || `<span>${partner.desc||''}</span>`;
                document.getElementById('matchCount').textContent = state.likedList.length;
            }
            document.getElementById('tinderLike').addEventListener('click',()=>{
                const p=getPartners(); if(!p?.length)return;
                const partner=p[state.likedIndex%p.length];
                if(!state.likedList.some(x=>x.name===partner.name)) state.likedList.push(partner);
                state.likedIndex++; renderTinder();
            });
            document.getElementById('tinderDislike').addEventListener('click',()=>{state.likedIndex++;renderTinder();});
            document.getElementById('toChat').addEventListener('click',()=>{
                if(!state.likedList.length){alert('Выбери кого-нибудь ❤️');return;}
                state.currentPartner=state.likedList[0]; state.step=3;
                showScene('scene3'); initChat();
            });

            // ---------- СЦЕНА 3 ----------
            const chatCont=document.getElementById('chatMessages'), chatRep=document.getElementById('chatReplies');
            function initChat(){
                state.chatStep=0;state.chatDone=false;
                document.getElementById('toLocations').disabled=true;
                document.getElementById('chatPartnerAvatar').src=state.currentPartner.avatar||'';
                document.getElementById('chatPartnerName').textContent=state.currentPartner.name||'';
                const f=getChatFlow(); if(!f){chatCont.innerHTML='<div class="message theirs">Нет диалогов</div>';return;}
                chatCont.innerHTML=`<div class="message theirs">${f[0].theirs}</div>`; renderChatReplies(0);
            }
            function renderChatReplies(s){
                const f=getChatFlow(); if(!f)return;
                if(s>=f.length){chatCont.innerHTML+='<div class="message theirs">✨ Договорились! Выбирай место ✨</div>';document.getElementById('toLocations').disabled=false;state.chatDone=true;chatRep.innerHTML='';chatCont.scrollTop=chatCont.scrollHeight;return;}
                chatRep.innerHTML='';
                f[s].replies.forEach((r,i)=>{const b=document.createElement('button');b.textContent=r;b.addEventListener('click',()=>{chatCont.innerHTML+=`<div class="message mine">${r}</div>`;const n=s+1;if(n<f.length){chatCont.innerHTML+=`<div class="message theirs">${f[n].theirs}</div>`;renderChatReplies(n);}else{chatCont.innerHTML+='<div class="message theirs">✨ Договорились! Выбирай место ✨</div>';document.getElementById('toLocations').disabled=false;state.chatDone=true;chatRep.innerHTML='';}chatCont.scrollTop=chatCont.scrollHeight;});chatRep.appendChild(b);});
            }
            document.getElementById('toLocations').addEventListener('click',()=>{if(!state.chatDone)return;state.step=4;showScene('scene4');renderLocations();});

            // ---------- СЦЕНА 4 ----------
            function renderLocations(){
                const c=document.getElementById('locationCatalog'), l=getLocations(); if(!l?.length)return;
                c.innerHTML='';
                l.forEach((loc,i)=>{
                    const d=document.createElement('div');
                    d.className='catalog-item'+(i===state.selectedLocationIndex?' selected':'');
                    let icon='📍';
                    if(loc.name.includes('☕'))icon='☕';else if(loc.name.includes('🍽️')||loc.name.includes('ресторан')||loc.name.includes('суши'))icon='🍽️';
                    else if(loc.name.includes('🎬')||loc.name.includes('кино'))icon='🎬';else if(loc.name.includes('🌳')||loc.name.includes('парк'))icon='🎢';
                    else if(loc.name.includes('🎨')||loc.name.includes('галерея'))icon='🎨';else if(loc.name.includes('🎵')||loc.name.includes('джаз'))icon='🎵';
                    else if(loc.name.includes('🏖️')||loc.name.includes('набережная'))icon='🌊';else if(loc.name.includes('🎳'))icon='🎳';
                    else if(loc.name.includes('🌿')||loc.name.includes('сад'))icon='🌿';
                    d.innerHTML=`<img src="${loc.bg||''}" onerror="this.style.display='none'"><div class="info"><h4>${loc.name}</h4><p>${loc.desc||''}</p></div><span class="location-icon">${icon}</span>`;
                    d.addEventListener('click',()=>{state.selectedLocationIndex=i;document.querySelectorAll('.catalog-item').forEach(el=>el.classList.remove('selected'));d.classList.add('selected');});
                    c.appendChild(d);
                });
            }
            document.getElementById('toDate').addEventListener('click',()=>{state.step=5;state.dialogIndex=0;state.affection=50;showScene('scene5');updateAffectionUI();document.getElementById('dateChat').innerHTML='';renderDateScene();});

            // ---------- СЦЕНА 5 ----------
            function updateAffectionUI(){const v=Math.min(100,Math.max(0,state.affection));document.getElementById('affectionFill').style.width=v+'%';document.getElementById('affectionLabel').textContent=v+'%';}
            function renderDateScene(){
                const partner=state.currentPartner, locs=getLocations(), loc=locs?.[state.selectedLocationIndex]||locs?.[0]||{};
                const dialogs=getDialogs(); if(!dialogs?.length){document.getElementById('dateChat').innerHTML='<div class="date-msg system">Нет диалогов</div>';return;}
                document.getElementById('dateBg').style.backgroundImage=`url('${loc.bg||''}')`;
                document.getElementById('dateAvatar').src=partner?.avatar||'';
                document.getElementById('datePartnerName').textContent=partner?.name||'';
                if(state.dialogIndex>=dialogs.length){
                    let end=state.affection>=70?(state.gender==='male'?'💖 Ты её зацепил!':'💖 Ты его зацепила!'):state.affection>=45?'❤️ Неплохо!':'💔 Уходит...';
                    const chat=document.getElementById('dateChat');
                    chat.innerHTML+=`<div class="date-msg system">🏁 ${end}</div>`;
                    chat.scrollTop=chat.scrollHeight;
                    if(state.affection>=100){setTimeout(()=>goToRoom(),1500);}
                    return;
                }
                const d=dialogs[state.dialogIndex];
                const react=state.affection>=65?'😍 Заинтересован(а)!':state.affection>=45?'😊 Улыбается.':state.affection>=25?'😐 В сторону.':'😒 Разочарован(а).';
                const chat=document.getElementById('dateChat');
                chat.innerHTML+=`<div class="date-msg theirs">${d.text} ${react}</div>`;
                const cd=document.createElement('div');cd.className='date-choices';
                d.choices.forEach((c,i)=>{const b=document.createElement('button');b.textContent=c;if(!i)b.classList.add('primary-choice');b.addEventListener('click',()=>{chat.innerHTML+=`<div class="date-msg mine">${c}</div>`;state.affection=Math.min(100,Math.max(0,state.affection+(d.effects[i]||0)));updateAffectionUI();state.dialogIndex++;cd.remove();chat.scrollTop=chat.scrollHeight;renderDateScene();});cd.appendChild(b);});
                chat.appendChild(cd);chat.scrollTop=chat.scrollHeight;
            }

            // ---------- СЦЕНА 6: КОМНАТА ----------
            function goToRoom(){
                state.step=6;state.roomDialogIndex=0;state.roomAffection=100;
                showScene('scene6');
                // Ставим фон room.png
                document.getElementById('roomBg').style.backgroundImage = "url('assets/room.png')";
                document.getElementById('roomAvatarSmall').src = state.currentPartner?.avatar || '';
                document.getElementById('roomPartnerName').textContent = state.currentPartner?.name || '';
                document.getElementById('roomAffectionFill').style.width = '100%';
                document.getElementById('roomAffectionValue').textContent = '100%';
                document.getElementById('roomChat').innerHTML = '<div class="room-msg system">🕯️ Вы в уединённой обстановке... Атмосфера накаляется...</div>';
                renderRoomScene();
            }

            function renderRoomScene(){
                const dialogs = getRoomDialogs(); if(!dialogs?.length) return;
                const chat = document.getElementById('roomChat');
                if(state.roomDialogIndex >= dialogs.length){
                    chat.innerHTML += `<div class="room-msg system">💫 Волшебный вечер... Это начало чего-то прекрасного ✨</div>`;
                    chat.scrollTop = chat.scrollHeight; return;
                }
                const d = dialogs[state.roomDialogIndex];
                const react = state.roomAffection>=90?'🔥 Искры повсюду!':'💕 Очень тепло...';
                chat.innerHTML += `<div class="room-msg theirs">${d.text} ${react}</div>`;
                const cd = document.createElement('div'); cd.className = 'room-choices';
                d.choices.forEach((c,i)=>{
                    const b = document.createElement('button'); b.textContent = c;
                    if(!i) b.classList.add('primary-choice');
                    b.addEventListener('click',()=>{
                        chat.innerHTML += `<div class="room-msg mine">${c}</div>`;
                        state.roomAffection = Math.min(100, Math.max(0, state.roomAffection + (d.effects[i]||0)));
                        document.getElementById('roomAffectionFill').style.width = state.roomAffection + '%';
                        document.getElementById('roomAffectionValue').textContent = state.roomAffection + '%';
                        state.roomDialogIndex++; cd.remove(); chat.scrollTop = chat.scrollHeight;
                        renderRoomScene();
                    });
                    cd.appendChild(b);
                });
                chat.appendChild(cd); chat.scrollTop = chat.scrollHeight;
            }

            // ---------- СБРОС ----------
            function resetGame(){
                state={step:1,gender:null,style:'style1',likedIndex:0,likedList:[],currentPartner:null,selectedLocationIndex:0,affection:50,dialogIndex:0,chatStep:0,chatDone:false,roomDialogIndex:0,roomAffection:100};
                showScene('scene1');
                document.querySelectorAll('#scene1 .gender-selector button').forEach(b=>b.classList.remove('active-male','active-female'));
                document.querySelectorAll('#scene1 .style-selector button').forEach(b=>b.classList.remove('active'));
                document.querySelector('#scene1 .style-selector button[data-style="style1"]').classList.add('active');
                toScene2Btn.classList.remove('enabled');toScene2Btn.disabled=true;
                mainAvatar.src='assets/boy1.png';
                document.getElementById('affectionFill').style.width='50%';
                document.getElementById('affectionLabel').textContent='50%';
                document.getElementById('dateChat').innerHTML='';
                document.getElementById('roomChat').innerHTML='';
            }

            document.getElementById('resetGame').addEventListener('click',resetGame);
            document.getElementById('resetFromRoom').addEventListener('click',resetGame);

            loadGameData();
            showScene('scene1');
            document.querySelector('#scene1 .style-selector button[data-style="style1"]').classList.add('active');
            state.style='style1';
        })();
    </script>
</body>
</html>
