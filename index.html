<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime Harem Clicker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a0033;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #game-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255,105,180,0.5);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <script>
        // ==================== ЯНДЕКС SDK ====================
        let ysdk = null;
        let player = null;
        
        async function initYandexSDK() {
            try {
                ysdk = await YaGames.init();
                console.log('✅ Яндекс SDK готов');
                try {
                    ysdk.adv.showBannerAdv({ position: 'bottom' });
                } catch(e) {}
                return true;
            } catch(e) {
                console.log('⚠️ Локальный режим');
                return false;
            }
        }
        
        function showRewardedAd(callback) {
            if(ysdk) {
                ysdk.adv.showRewardedVideo({
                    onRewarded: () => callback(true),
                    onError: () => callback(true),
                    onClose: () => {}
                });
            } else {
                setTimeout(() => callback(true), 500);
            }
        }

        // ==================== ИГРА ====================
        let clicks = 0;
        let clickPower = 1;
        let autoClicks = 0;
        let girlIndex = 0;
        let gachaCooldown = 0;
        let kingMode = false;
        let prices = { auto: 30, double: 100, turbo: 300 };
        
        const girls = [
            { name: 'Нэко-тян', threshold: 0 },
            { name: 'Цундере', threshold: 50 },
            { name: 'Демон-тян', threshold: 150 },
            { name: 'Андроид-тян', threshold: 300 },
            { name: 'Принцесса', threshold: 500 },
            { name: 'Суккуб', threshold: 800 },
            { name: 'Ночная ведьма', threshold: 1200 }
        ];

        const config = {
            type: Phaser.AUTO,
            width: 480,
            height: 800,
            parent: 'game-container',
            backgroundColor: '#2d0a3d',
            scene: { preload, create, update },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
        };

        const game = new Phaser.Game(config);
        let scene;

        function preload() {
            // Загружаем все картинки
            this.load.image('room', 'assets/room.jpg');
            this.load.image('girl1', 'assets/girl1.jpg');
            this.load.image('girl2', 'assets/girl2.jpg');
            this.load.image('girl3', 'assets/girl3.png');
            this.load.image('girl4', 'assets/girl4.png');
            this.load.image('girl5', 'assets/girl5.png');
            this.load.image('girl6', 'assets/girl6.png');
            this.load.image('girl7', 'assets/girl7.png');
        }

        function create() {
            scene = this;
            
            // Фон комнаты
            this.add.image(240, 400, 'room').setDisplaySize(480, 800).setDepth(0);
            
            // Градиентный оверлей для красоты
            const overlay = this.add.graphics().setDepth(1);
            overlay.fillGradientStyle(0xff69b4, 0xff69b4, 0x8b00ff, 0x8b00ff, 0.3);
            overlay.fillRect(0, 0, 480, 800);
            
            // Спрайт девушки
            this.girlSprite = this.add.image(240, 340, 'girl1')
                .setDisplaySize(320, 320)
                .setDepth(3);
            
            // Имя девушки
            this.nameText = this.add.text(240, 180, 'Нэко-тян', {
                fontSize: '28px',
                fill: '#ffffff',
                stroke: '#ff1493',
                strokeThickness: 5,
                fontFamily: 'Arial Black'
            }).setOrigin(0.5).setDepth(5);
            
            // Счёт
            this.scoreText = this.add.text(240, 40, '❤️ 0', {
                fontSize: '46px',
                fill: '#ffffff',
                stroke: '#ff1493',
                strokeThickness: 6,
                fontFamily: 'Arial Black'
            }).setOrigin(0.5).setDepth(5);
            
            // Статус
            this.statusText = this.add.text(240, 85, 'Сила: +1 | Авто: 0/с', {
                fontSize: '16px',
                fill: '#ffb6c1',
                stroke: '#8b008b',
                strokeThickness: 3
            }).setOrigin(0.5).setDepth(5);
            
            // Прогресс
            this.progressText = this.add.text(240, 760, 'Следующая через 50 кликов', {
                fontSize: '14px',
                fill: '#ffffff',
                stroke: '#ff1493',
                strokeThickness: 3
            }).setOrigin(0.5).setDepth(5);
            
            // Кнопка ТЫК
            const btnY = 530;
            this.clickBtn = this.add.graphics().setDepth(5);
            this.clickBtn.fillStyle(0xff1493, 1);
            this.clickBtn.fillRoundedRect(140, btnY-35, 200, 70, 25);
            this.clickBtn.lineStyle(3, 0xff69b4, 1);
            this.clickBtn.strokeRoundedRect(140, btnY-35, 200, 70, 25);
            
            this.clickText = this.add.text(240, btnY, '❤️ ТЫК! ❤️', {
                fontSize: '30px',
                fill: '#ffffff',
                stroke: '#8b008b',
                strokeThickness: 5,
                fontFamily: 'Arial Black'
            }).setOrigin(0.5).setDepth(6);
            
            const clickZone = this.add.zone(240, btnY, 200, 70)
                .setInteractive({ useHandCursor: true })
                .setDepth(7);
            
            clickZone.on('pointerdown', () => {
                handleClick();
                this.tweens.add({
                    targets: [this.clickBtn, this.clickText],
                    scaleX: 0.9, scaleY: 0.9,
                    duration: 50, yoyo: true
                });
            });
            
            // Кнопка девушки (тоже кликабельная)
            this.girlSprite.setInteractive({ useHandCursor: true });
            this.girlSprite.on('pointerdown', () => {
                handleClick();
                this.tweens.add({
                    targets: this.girlSprite,
                    scaleX: 1.1, scaleY: 1.1,
                    duration: 50, yoyo: true
                });
            });
            
            // Магазин
            createShopButton(this, 80, 620, 'Автоклик\n❤️30', () => buyUpgrade('auto'));
            createShopButton(this, 240, 620, 'Двойной\n❤️100', () => buyUpgrade('double'));
            createShopButton(this, 400, 620, 'Турбо\n❤️300', () => buyUpgrade('turbo'));
            
            // Гача-капсула
            const gachaY = 700;
            this.gachaBg = this.add.graphics().setDepth(5);
            this.gachaBg.fillStyle(0x9400d3, 1);
            this.gachaBg.fillRoundedRect(130, gachaY-20, 220, 45, 15);
            this.gachaBg.lineStyle(2, 0xff69b4, 1);
            this.gachaBg.strokeRoundedRect(130, gachaY-20, 220, 45, 15);
            
            this.gachaBtnText = this.add.text(240, gachaY, '🎰 Сменить наряд', {
                fontSize: '18px',
                fill: '#ffffff',
                stroke: '#4b0082',
                strokeThickness: 4,
                fontFamily: 'Arial Black'
            }).setOrigin(0.5).setDepth(6);
            
            this.gachaTimerText = this.add.text(240, gachaY+25, '', {
                fontSize: '12px',
                fill: '#ffb6c1'
            }).setOrigin(0.5).setDepth(6);
            
            const gachaZone = this.add.zone(240, gachaY, 220, 45)
                .setInteractive({ useHandCursor: true })
                .setDepth(7);
            
            gachaZone.on('pointerdown', () => {
                if(gachaCooldown > 0) {
                    showRewardedAd((success) => {
                        gachaCooldown = 0;
                        clicks += 50;
                        updateUI();
                        spawnConfetti(20);
                    });
                } else {
                    gachaCooldown = 30;
                    spawnConfetti(20);
                }
            });
            
            // Таймер автоклика
            this.time.addEvent({
                delay: 1000,
                loop: true,
                callback: () => {
                    if(autoClicks > 0) {
                        clicks += autoClicks;
                        checkProgress();
                        updateUI();
                    }
                    if(gachaCooldown > 0) {
                        gachaCooldown--;
                        this.gachaTimerText.setText('⏳ ' + gachaCooldown + 'с');
                    } else {
                        this.gachaTimerText.setText('Готово!');
                    }
                }
            });
            
            // Запускаем Яндекс SDK
            initYandexSDK();
        }

        function handleClick() {
            clicks += clickPower;
            
            // Звук
            try {
                const ctx = new (window.AudioContext||window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = 800; g.gain.value = 0.1;
                o.start(); o.stop(ctx.currentTime+0.05);
            } catch(e) {}
            
            // Сердечки
            spawnHearts(5);
            
            checkProgress();
            updateUI();
        }

        function spawnHearts(count) {
            for(let i=0; i<count; i++) {
                const heart = scene.add.text(
                    240 + Phaser.Math.Between(-60, 60),
                    340 + Phaser.Math.Between(-60, 60),
                    '❤️',
                    { fontSize: Phaser.Math.Between(15, 30) + 'px' }
                ).setDepth(10);
                
                scene.tweens.add({
                    targets: heart,
                    y: heart.y - Phaser.Math.Between(50, 150),
                    x: heart.x + Phaser.Math.Between(-50, 50),
                    alpha: 0,
                    scale: 0.3,
                    duration: 800,
                    onComplete: () => heart.destroy()
                });
            }
        }

        function spawnConfetti(count) {
            const emojis = ['✨', '🎉', '💖', '🌸', '💫', '🎀', '💝', '🌟'];
            for(let i=0; i<count; i++) {
                const c = scene.add.text(
                    240 + Phaser.Math.Between(-150, 150),
                    340,
                    Phaser.Utils.Array.GetRandom(emojis),
                    { fontSize: Phaser.Math.Between(15, 35) + 'px' }
                ).setDepth(10);
                
                scene.tweens.add({
                    targets: c,
                    y: c.y + Phaser.Math.Between(200, 500),
                    x: c.x + Phaser.Math.Between(-100, 100),
                    alpha: 0,
                    angle: Phaser.Math.Between(-180, 180),
                    duration: 1500,
                    onComplete: () => c.destroy()
                });
            }
        }

        function checkProgress() {
            if(kingMode) return;
            
            for(let i = girls.length-1; i >= 0; i--) {
                if(clicks >= girls[i].threshold && girlIndex < i) {
                    girlIndex = i;
                    changeGirl();
                    break;
                }
            }
            
            if(clicks >= 5000 && !kingMode) {
                kingMode = true;
                const victoryText = scene.add.text(240, 300, '👑 ТЫ КОРОЛЬ ГАРЕМА! 👑', {
                    fontSize: '30px',
                    fill: '#ffdd00',
                    stroke: '#aa4400',
                    strokeThickness: 5,
                    fontFamily: 'Arial Black'
                }).setOrigin(0.5).setDepth(10);
                
                scene.tweens.add({
                    targets: victoryText,
                    scaleX: 1.2, scaleY: 1.2,
                    duration: 2000,
                    yoyo: true,
                    repeat: 2,
                    onComplete: () => {
                        scene.tweens.add({
                            targets: victoryText,
                            alpha: 0,
                            duration: 1000,
                            onComplete: () => victoryText.destroy()
                        });
                    }
                });
                
                spawnConfetti(50);
            }
        }

        function changeGirl() {
            // Туман
            const fog = scene.add.graphics().setDepth(8);
            fog.fillStyle(0xff69b4, 0.5);
            fog.fillRect(0, 0, 480, 800);
            
            // Меняем картинку
            scene.girlSprite.setTexture('girl' + (girlIndex + 1));
            scene.nameText.setText(girls[girlIndex].name);
            
            // Анимация появления
            scene.girlSprite.setScale(0);
            scene.tweens.add({
                targets: scene.girlSprite,
                scaleX: 1, scaleY: 1,
                duration: 500,
                ease: 'Back.easeOut'
            });
            
            // Убираем туман
            scene.tweens.add({
                targets: fog,
                alpha: 0,
                duration: 500,
                delay: 300,
                onComplete: () => fog.destroy()
            });
            
            spawnConfetti(40);
        }

        function buyUpgrade(type) {
            const price = prices[type];
            if(clicks >= price) {
                clicks -= price;
                if(type === 'auto') autoClicks++;
                if(type === 'double') clickPower += 2;
                if(type === 'turbo') clickPower += 5;
                prices[type] *= 2;
                updateShopTexts();
                spawnConfetti(15);
                updateUI();
            }
        }

        function createShopButton(scene, x, y, text, callback) {
            const bg = scene.add.graphics().setDepth(5);
            bg.fillStyle(0x8b008b, 1);
            bg.fillRoundedRect(x-50, y-25, 100, 55, 12);
            bg.lineStyle(2, 0xff69b4, 1);
            bg.strokeRoundedRect(x-50, y-25, 100, 55, 12);
            
            const btnText = scene.add.text(x, y, text, {
                fontSize: '14px',
                fill: '#ffffff',
                stroke: '#4b0082',
                strokeThickness: 3,
                align: 'center',
                fontFamily: 'Arial'
            }).setOrigin(0.5).setDepth(6);
            
            const zone = scene.add.zone(x, y, 100, 55)
                .setInteractive({ useHandCursor: true })
                .setDepth(7);
            
            zone.on('pointerdown', callback);
            zone.on('pointerover', () => scene.tweens.add({ targets: [bg, btnText], scaleX: 1.1, scaleY: 1.1, duration: 100 }));
            zone.on('pointerout', () => scene.tweens.add({ targets: [bg, btnText], scaleX: 1, scaleY: 1, duration: 100 }));
            
            if(text.includes('Автоклик')) scene.autoBtnText = btnText;
            if(text.includes('Двойной')) scene.doubleBtnText = btnText;
            if(text.includes('Турбо')) scene.turboBtnText = btnText;
        }

        function updateShopTexts() {
            if(scene.autoBtnText) scene.autoBtnText.setText('Автоклик\n❤️' + prices.auto);
            if(scene.doubleBtnText) scene.doubleBtnText.setText('Двойной\n❤️' + prices.double);
            if(scene.turboBtnText) scene.turboBtnText.setText('Турбо\n❤️' + prices.turbo);
        }

        function updateUI() {
            scene.scoreText.setText('❤️ ' + clicks);
            scene.statusText.setText('Сила: +' + clickPower + ' | Авто: ' + autoClicks + '/с');
            
            if(kingMode) {
                scene.progressText.setText('👑 Бесконечный гарем!');
            } else {
                let nextThreshold = 5000;
                for(let g of girls) {
                    if(clicks < g.threshold) { nextThreshold = g.threshold; break; }
                }
                const remaining = nextThreshold - clicks;
                scene.progressText.setText('Следующая через ' + remaining + ' кликов');
            }
        }

        function update() {}
    </script>
</body>
</html>
