<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tantan — знакомства</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }
        #app {
            max-width: 390px;
            width: 100%;
            height: 780px;
            background: #111122;
            border-radius: 36px;
            padding: 10px 12px 12px;
            color: #f0eef7;
            border: 1px solid #222244;
            box-shadow: 0 20px 60px rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0 8px;
            flex-shrink: 0;
        }
        .top-bar .time { font-size: 13px; font-weight: 600; color: #c8c0e0; letter-spacing: 0.3px; }
        .top-bar .logo {
            font-size: 18px; font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d, #ff3b7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .top-bar .icons { display: flex; gap: 14px; font-size: 16px; color: #8880aa; cursor: pointer; }

        .hidden { display: none !important; }

        #scene1 { flex: 1; display: flex; flex-direction: column; min-height: 0; gap: 6px; }
        .gender-selector { flex-shrink: 0; text-align: center; padding: 2px 0; }
        .gender-selector .label { font-size: 16px; font-weight: 600; color: #b0a8d0; margin-bottom: 6px; display: block; }
        .gender-selector .btn-group { display: flex; gap: 10px; justify-content: center; }
        .gender-selector .btn-group button {
            padding: 8px 28px; border-radius: 60px; font-weight: 600; font-size: 15px; cursor: pointer;
            transition: 0.2s; border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05); color: #9088b0; flex: 1; max-width: 140px;
        }
        .gender-selector .btn-group button:hover { background: rgba(255,255,255,0.08); }
        .gender-selector .btn-group button.active-male { border-color: #4a8af4; background: rgba(74,138,244,0.15); color: #8ab8ff; }
        .gender-selector .btn-group button.active-female { border-color: #ff4d8a; background: rgba(255,77,138,0.15); color: #ff8aad; }

        .avatar-display {
            flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0;
            border-radius: 16px; overflow: hidden; background: #0a0a18; position: relative;
        }
        .avatar-display img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; }
        .avatar-display .avatar-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #3a3a5a; background: #0a0a18; }

        .style-selector { flex-shrink: 0; display: flex; gap: 8px; justify-content: center; padding: 2px 0 4px; }
        .style-selector button {
            flex: 1; padding: 10px 8px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03); color: #9088b0; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px; max-width: 100px;
        }
        .style-selector button .icon { font-size: 22px; line-height: 1.2; }
        .style-selector button .label { font-size: 10px; color: #6a6290; }
        .style-selector button:hover { background: rgba(255,255,255,0.06); }
        .style-selector button.active { border-color: #ff4d8a; background: rgba(255,77,138,0.08); color: #fff; }
        .style-selector button.active .label { color: #ff8aad; }

        .next-btn-wrap { flex-shrink: 0; display: flex; justify-content: center; padding: 2px 0; }
        .next-btn-wrap button {
            padding: 10px 40px; border-radius: 60px; font-weight: 700; font-size: 15px; cursor: pointer;
            transition: 0.2s; border: none; background: #4a6aaa; color: white; width: 100%; max-width: 200px;
            opacity: 0.4; pointer-events: none;
        }
        .next-btn-wrap button.enabled { opacity: 1; pointer-events: auto; background: #ff4d8a; }
        .next-btn-wrap button.enabled:hover { background: #e63a77; transform: scale(1.02); }
        .next-btn-wrap button.enabled:active { transform: scale(0.97); }

        #scene2 { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
        .tinder-card-wrapper {
            flex: 1; display: flex; flex-direction: column; border-radius: 20px; overflow: hidden;
            background: #0d0d20; position: relative; min-height: 0;
        }
        .tinder-photo { flex: 1; position: relative; min-height: 0; background: #0a0a18; }
        .tinder-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .tinder-counter {
            position: absolute; top: 16px; right: 16px; z-index: 4;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 6px 14px; border-radius: 20px;
            font-size: 13px; font-weight: 700; color: #ff4d8a; border: 1px solid rgba(255,77,138,0.3);
        }
        .tinder-info {
            position: relative; z-index: 3; padding: 16px 16px 12px;
            background: linear-gradient(to top, rgba(13,13,32,0.98) 0%, rgba(13,13,32,0.9) 100%);
            flex-shrink: 0;
        }
        .tinder-info .name-age { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -0.3px; }
        .tinder-info .desc { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .tinder-info .desc .badge { background: rgba(255,77,138,0.15); backdrop-filter: blur(10px); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #ff8aad; border: 1px solid rgba(255,77,138,0.25); white-space: nowrap; }
        .tinder-info .desc .job-badge { color: #a0c4ff; }
        .tinder-info .desc .city-badge { color: #80e0a0; }
        .tinder-info .desc .personality-badge { color: #ffd700; border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.1); }

        .tinder-actions {
            position: relative; z-index: 5; display: flex; gap: 16px; justify-content: center; align-items: center;
            padding: 12px 16px 16px; background: rgba(13,13,32,0.95); flex-shrink: 0;
        }
        .tinder-actions button { height: 56px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .tinder-actions .btn-dislike { width: 56px; background: rgba(20,20,40,0.9); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.15); color: #ff6b6b; }
        .tinder-actions .btn-dislike:active { transform: scale(0.9); background: rgba(255,80,80,0.2); }
        .tinder-actions .btn-like { width: 56px; background: linear-gradient(135deg, #ff4d8a, #ff6b9d); color: white; border: 2px solid rgba(255,255,255,0.2); }
        .tinder-actions .btn-like:active { transform: scale(0.9); background: linear-gradient(135deg, #e63a77, #ff5288); }
        .tinder-actions .btn-chat { width: auto; border-radius: 30px; padding: 0 28px; font-size: 15px; font-weight: 700; background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1.5px solid rgba(255,255,255,0.2); color: #fff; letter-spacing: 0.5px; white-space: nowrap; }
        .tinder-actions .btn-chat:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }

        /* ----- СЦЕНА 3: ЧАТ ----- */
        #scene3 {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        #scene3 .simple-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 8px;
            background: #1a1a36;
            border-radius: 20px;
            border: 1px solid #2a2a4e;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            padding: 0 2px;
            margin-bottom: 6px;
        }
        .chat-header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2a2a4a;
            border: 2px solid #ff4d8a;
        }
        .chat-header .name {
            font-weight: 600;
            font-size: 16px;
            color: #f0ecff;
        }
        .chat-header .status {
            margin-left: auto;
            font-size: 11px;
            color: #6a6290;
        }

        .chat-messages-wrapper {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 4px;
            padding-right: 2px;
            min-height: 0;
        }
        .chat-messages-wrapper::-webkit-scrollbar { width: 3px; }
        .chat-messages-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .chat-messages-wrapper::-webkit-scrollbar-thumb { background: rgba(255,77,138,0.3); border-radius: 10px; }

        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .message {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            animation: msgAppear 0.2s ease;
        }
        .message.mine {
            background: #4a6a9a;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }
        .message.theirs {
            background: #222248;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }
        .message.typing {
            background: transparent;
            align-self: flex-start;
            color: #8880aa;
            font-style: italic;
            font-size: 14px;
            animation: dots 1s steps(4) infinite;
            padding: 4px 0;
        }
        @keyframes msgAppear {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes dots {
            0% { content: "Печатает"; }
            25% { content: "Печатает."; }
            50% { content: "Печатает.."; }
            75% { content: "Печатает..."; }
        }

        .chat-replies-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .chat-reply-btn {
            width: 100%;
            text-align: left;
            padding: 8px 14px;
            background: #1a1a3e;
            border: 1px solid #3a3a5e;
            border-radius: 12px;
            font-weight: 400;
            font-size: 13px;
            color: #d0c8f0;
            cursor: pointer;
            transition: 0.15s ease;
            line-height: 1.3;
            flex-shrink: 0;
        }
        .chat-reply-btn:hover {
            background: #222252;
            border-color: #4a4a7e;
        }
        .chat-reply-btn:active {
            transform: scale(0.97);
            background: #2a2a52;
        }

        .chat-next-btn {
            margin-top: 4px;
            padding: 8px 24px;
            font-size: 14px;
            align-self: center;
            background: linear-gradient(135deg, #ff4d8a, #ff6b9d);
            border: none;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
            display: none;
        }
        .chat-next-btn.visible {
            display: block;
        }
        .chat-next-btn:active {
            transform: scale(0.97);
        }

        /* ----- СЦЕНА 4: ЛОКАЦИИ ----- */
        #scene4 { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        #scene4 .simple-card { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 12px; }
        .catalog-grid { flex: 1; overflow-y: auto; padding: 4px 2px 8px; display: flex; flex-direction: column; gap: 8px; min-height: 0; max-height: none; }
        .catalog-grid::-webkit-scrollbar { width: 3px; }
        .catalog-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .catalog-grid::-webkit-scrollbar-thumb { background: rgba(255,77,138,0.3); border-radius: 10px; }
        .catalog-item {
            background: #16163a; padding: 12px 14px; border-radius: 16px; display: flex; align-items: center;
            gap: 12px; border: 1.5px solid #2a2a4e; cursor: pointer; transition: 0.2s ease; flex-shrink: 0; min-height: 70px;
        }
        .catalog-item:hover { background: #1e1e48; border-color: #3a3a5e; }
        .catalog-item:active { transform: scale(0.98); background: #222250; }
        .catalog-item img { width: 50px; height: 50px; border-radius: 14px; object-fit: cover; background: #2a2a4a; border: 2px solid rgba(255,255,255,0.08); flex-shrink: 0; }
        .catalog-item .info { flex: 1; min-width: 0; }
        .catalog-item .info h4 { font-size: 15px; color: #e0d8f0; font-weight: 700; margin-bottom: 4px; }
        .catalog-item .info p { font-size: 12px; color: #9088b0; line-height: 1.3; }
        .catalog-item .info .tags { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
        .catalog-item .info .tags span { background: rgba(255,77,138,0.1); padding: 2px 8px; border-radius: 10px; font-size: 9px; color: #ff8aad; border: 1px solid rgba(255,77,138,0.15); }
        .catalog-item .location-icon { font-size: 24px; margin-left: auto; opacity: 0.5; transition: 0.2s; }
        .catalog-item:hover .location-icon { opacity: 0.8; }
        .catalog-item.selected { border: 2px solid #ff4d8a; background: #1e1e4a; box-shadow: 0 0 20px rgba(255,77,138,0.15); }
        .catalog-item.selected .location-icon { opacity: 1; color: #ff4d8a; }

        #toDate { margin-top: 8px; padding: 10px 32px; font-size: 15px; font-weight: 700; align-self: center; background: linear-gradient(135deg, #ff4d8a, #ff6b9d); border: none; color: white; border-radius: 60px; cursor: pointer; flex-shrink: 0; }
        #toDate:active { transform: scale(0.97); }

        /* ----- СЦЕНА 5: СВИДАНИЕ ----- */
        #scene5 {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            background: #0d0d20;
            border: none;
            margin: -10px -12px -12px;
            padding: 0;
            width: calc(100% + 24px);
        }

        /* Фон с локацией */
        .date-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* Персонаж — снизу, по высоте максимально, ширина сохраняет пропорции */
        .date-avatar-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }
        .date-avatar-section img {
            height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            object-position: bottom center;
        }

        /* Затемнение только на персонаже (снизу) */
        .date-overlay-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Контент поверх всего */
        .date-content {
            position: relative;
            z-index: 3;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 12px 4px;
            min-height: 0;
        }

        /* Верх: имя + шкала */
        .date-top {
            flex-shrink: 0;
            padding: 4px 4px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .date-top .partner-name {
            font-weight: 700;
            font-size: 24px;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        .date-top .affection-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .date-top .affection-wrap .bar {
            width: 60px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            overflow: hidden;
        }
        .date-top .affection-wrap .bar .fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #ff4d8a, #ff6b9d);
            border-radius: 20px;
            transition: width 0.4s ease;
        }
        .date-top .affection-wrap .label {
            font-size: 14px;
            font-weight: 700;
            color: #ff4d8a;
            min-width: 32px;
            text-align: right;
        }

        /* Диалог — между именем и вариантами */
        .date-chat-wrapper {
            flex: 0 1 auto;
            overflow-y: auto;
            padding: 4px 2px 4px;
            max-height: 160px;
            min-height: 40px;
            margin-bottom: 4px;
        }
        .date-chat-wrapper::-webkit-scrollbar { width: 3px; }
        .date-chat-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .date-chat-wrapper::-webkit-scrollbar-thumb { background: rgba(255,77,138,0.3); border-radius: 10px; }

        .date-chat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .date-msg {
            max-width: 90%;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
            animation: msgAppear 0.3s ease;
            word-break: break-word;
        }
        .date-msg.theirs {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.06);
            color: #e8e4f0;
        }
        .date-msg.mine {
            background: #ff4d8a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #fff;
        }
        .date-msg.system {
            background: rgba(255,77,138,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,77,138,0.15);
            align-self: center;
            color: #ff8aad;
            font-size: 12px;
            border-radius: 40px;
            padding: 4px 14px;
            max-width: 92%;
            text-align: center;
        }

        /* Варианты ответа — чуть меньше */
        .date-choices-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px 0 6px;
            position: relative;
            z-index: 4;
        }

        .date-choice-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 7px 14px;
            border-radius: 60px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: 0.15s ease;
            width: 100%;
            line-height: 1.3;
            flex-shrink: 0;
            letter-spacing: 0.2px;
        }
        .date-choice-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
        }
        .date-choice-btn:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.12);
        }

        .btn-reset {
            position: relative;
            z-index: 4;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 5px 18px;
            border-radius: 60px;
            font-weight: 500;
            color: #9088b0;
            font-size: 12px;
            cursor: pointer;
            flex: 0 0 auto;
            backdrop-filter: blur(8px);
            margin: 2px auto 6px;
            transition: 0.2s;
            align-self: center;
        }
        .btn-reset:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }

        /* ----- СЦЕНА 6: КОМНАТА ----- */
        #scene6 {
            flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; border-radius: 0;
            overflow: hidden; background: #1a0a1a; border: none; margin: -10px -12px -12px; padding: 0; width: calc(100% + 24px);
        }
        .room-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-size: cover; background-position: center; background-repeat: no-repeat; z-index: 0; }
        .room-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(10,5,15,0.6) 0%, rgba(20,10,30,0.4) 30%, rgba(20,10,30,0.4) 70%, rgba(10,5,15,0.85) 100%); z-index: 1; pointer-events: none; }
        .room-content { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; padding: 16px 12px 0; min-height: 0; }

        .room-top-bar {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px); border-radius: 20px; border: 1px solid rgba(255,77,138,0.15);
            flex-shrink: 0; margin-bottom: 8px;
        }
        .room-top-bar .room-avatar-small { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #ff4d8a; flex-shrink: 0; }
        .room-top-bar .room-info-text { flex: 1; min-width: 0; }
        .room-top-bar .room-partner-name { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
        .room-top-bar .room-status { font-size: 11px; color: #ff8aad; font-weight: 500; }
        .room-top-bar .room-hearts { font-size: 18px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }

        .room-chat-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 4px 4px 8px;
            min-height: 0;
        }
        .room-chat-wrapper::-webkit-scrollbar { width: 4px; }
        .room-chat-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; margin: 4px 0; }
        .room-chat-wrapper::-webkit-scrollbar-thumb { background: rgba(255,77,138,0.4); border-radius: 10px; }

        .room-chat {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .room-msg {
            max-width: 85%; padding: 10px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5;
            animation: msgAppear 0.3s ease; word-break: break-word;
        }
        .room-msg.theirs { background: rgba(255,77,138,0.15); align-self: flex-start; border-bottom-left-radius: 6px; border: 1px solid rgba(255,77,138,0.25); color: #f0d0e0; backdrop-filter: blur(8px); }
        .room-msg.mine { background: linear-gradient(135deg, rgba(255,77,138,0.55), rgba(255,100,150,0.45)); align-self: flex-end; border-bottom-right-radius: 6px; color: #fff; border: 1px solid rgba(255,77,138,0.35); }
        .room-msg.system { background: rgba(255,77,138,0.1); border: 1px solid rgba(255,77,138,0.15); align-self: center; color: #d090b0; font-size: 12px; border-radius: 40px; padding: 6px 16px; max-width: 90%; text-align: center; backdrop-filter: blur(8px); }

        .room-choices-wrapper {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px 0 8px;
            max-height: 130px;
            overflow-y: auto;
        }
        .room-choices-wrapper::-webkit-scrollbar { width: 3px; }
        .room-choices-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .room-choices-wrapper::-webkit-scrollbar-thumb { background: rgba(255,77,138,0.2); border-radius: 10px; }

        .room-choice-btn {
            background: rgba(255,77,138,0.1);
            border: 1px solid rgba(255,77,138,0.2);
            padding: 8px 14px;
            border-radius: 14px;
            color: #e0c0d8;
            font-size: 13px;
            font-weight: 400;
            text-align: left;
            cursor: pointer;
            transition: 0.2s ease;
            width: 100%;
            backdrop-filter: blur(8px);
            line-height: 1.3;
            flex-shrink: 0;
        }
        .room-choice-btn:hover { background: rgba(255,77,138,0.2); border-color: rgba(255,77,138,0.4); }
        .room-choice-btn:active { transform: scale(0.97); background: rgba(255,77,138,0.3); }

        .room-affection-bar-wrap {
            position: relative; z-index: 3; flex-shrink: 0; padding: 10px 16px 8px;
            background: linear-gradient(0deg, rgba(10,5,15,0.95) 0%, rgba(10,5,15,0.7) 60%, transparent 100%);
        }
        .room-affection-inner {
            display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
            padding: 8px 14px; border-radius: 30px; border: 1px solid rgba(255,77,138,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .room-affection-inner .aff-icon { font-size: 18px; flex-shrink: 0; }
        .room-affection-inner .aff-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .room-affection-inner .aff-bar .aff-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff2d6a, #ff4d8a, #ff9ec4); border-radius: 10px; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(255,77,138,0.5); }
        .room-affection-inner .aff-value { font-size: 13px; font-weight: 700; color: #ff4d8a; min-width: 36px; text-align: right; flex-shrink: 0; }

        .btn-room-reset { position: relative; z-index: 3; flex-shrink: 0; margin: 6px auto 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); padding: 8px 24px; border-radius: 60px; font-weight: 600; color: #b090a0; font-size: 13px; cursor: pointer; backdrop-filter: blur(8px); transition: 0.2s; }
        .btn-room-reset:hover { background: rgba(255,255,255,0.1); color: #d0b0c0; }
        .btn-room-reset:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }

        .simple-card { background: #1a1a36; border-radius: 20px; padding: 12px; border: 1px solid #2a2a4e; flex: 1; display: flex; flex-direction: column; min-height: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="app">
        <div class="top-bar" id="mainTopBar">
            <span class="time" id="clockDisplay">9:42</span>
            <span class="logo">TANTAN</span>
            <div class="icons"><span>🔔</span><span>⚙️</span></div>
        </div>

        <div id="sceneContainer" style="flex:1; display:flex; flex-direction:column; min-height:0;">
            <!-- СЦЕНА 1 -->
            <div id="scene1" style="flex:1; display:flex; flex-direction:column; min-height:0;">
                <div class="gender-selector">
                    <span class="label">👤 Выбери свой пол</span>
                    <div class="btn-group">
                        <button id="genderMale" data-gender="male">Мужчина</button>
                        <button id="genderFemale" data-gender="female">Женщина</button>
                    </div>
                </div>
                <div class="avatar-display" id="avatarDisplay">
                    <img id="mainAvatar" src="assets/boy1.png" alt="аватар" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="avatar-placeholder" style="display:none;">👤</div>
                </div>
                <div class="style-selector">
                    <button data-style="style1" class="active"><span class="icon">🕶️</span><span class="label">Стиль 1</span></button>
                    <button data-style="style2"><span class="icon">🎸</span><span class="label">Стиль 2</span></button>
                    <button data-style="style3"><span class="icon">🧢</span><span class="label">Стиль 3</span></button>
                </div>
                <div class="next-btn-wrap"><button id="toScene2" disabled>Далее →</button></div>
            </div>

            <!-- СЦЕНА 2 -->
            <div id="scene2" class="hidden" style="flex:1; display:flex; flex-direction:column;">
                <div class="tinder-card-wrapper" id="tinderCard">
                    <div class="tinder-photo">
                        <img id="tinderAvatar" src="assets/girl1.png" alt="партнёр">
                        <div class="tinder-counter" id="matchCounter"><span class="heart">❤️</span> <span id="matchCount">0</span></div>
                    </div>
                    <div class="tinder-info">
                        <div class="name-age" id="tinderName">Анна, 24</div>
                        <div class="desc" id="tinderDesc"><span class="job-badge">💼 Дизайнер</span><span class="badge">♏ Скорпион</span><span class="city-badge">📍 Москва</span><span class="personality-badge">💕 Романтик</span></div>
                    </div>
                    <div class="tinder-actions">
                        <button class="btn-dislike" id="tinderDislike">✕</button>
                        <button class="btn-chat" id="toChat">💬 Написать</button>
                        <button class="btn-like" id="tinderLike">❤️</button>
                    </div>
                </div>
            </div>

            <!-- СЦЕНА 3: ЧАТ -->
            <div id="scene3" class="hidden" style="flex:1; display:flex; flex-direction:column;">
                <div class="simple-card" style="padding:8px;">
                    <div class="chat-header">
                        <img id="chatPartnerAvatar" src="assets/girl1.png" alt="">
                        <span class="name" id="chatPartnerName">Анна</span>
                        <span class="status">онлайн</span>
                    </div>
                    <div class="chat-messages-wrapper" id="chatMessagesWrapper">
                        <div class="chat-messages" id="chatMessages">
                            <div class="message theirs">Привет! 😊 Как дела?</div>
                        </div>
                    </div>
                    <div class="chat-replies-wrapper" id="chatRepliesWrapper"></div>
                    <button class="chat-next-btn" id="toLocations">Выбрать место →</button>
                </div>
            </div>

            <!-- СЦЕНА 4: ЛОКАЦИИ -->
            <div id="scene4" class="hidden" style="flex:1; display:flex; flex-direction:column; min-height:0;">
                <div class="simple-card" style="flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; padding:12px;">
                    <div style="display:flex; gap:4px; align-items:center; flex-shrink:0; padding:4px 2px 8px;">
                        <span style="font-size:16px;font-weight:700;color:#e0d8f0;">📍 Выбери место для встречи</span>
                    </div>
                    <div id="locationCatalog" class="catalog-grid" style="flex:1; overflow-y:auto; padding:4px 2px 8px; display:flex; flex-direction:column; gap:8px; min-height:0;"></div>
                    <button id="toDate" style="margin-top:8px;padding:10px 32px;font-size:15px;font-weight:700;align-self:center;background:linear-gradient(135deg,#ff4d8a,#ff6b9d);border:none;color:white;border-radius:60px;cursor:pointer;flex-shrink:0;">Назначить встречу ❤️</button>
                </div>
            </div>

            <!-- СЦЕНА 5: СВИДАНИЕ -->
            <div id="scene5" class="hidden">
                <!-- Фон локации -->
                <div class="date-bg" id="dateBg"></div>
                
                <!-- Персонаж снизу, по высоте максимально, ширина с сохранением пропорций -->
                <div class="date-avatar-section">
                    <img id="dateAvatarFull" src="assets/girl1.png" alt="">
                </div>
                
                <!-- Затемнение на персонаже -->
                <div class="date-overlay-bottom"></div>
                
                <!-- Контент поверх -->
                <div class="date-content">
                    <!-- Имя + шкала вверху -->
                    <div class="date-top">
                        <div class="partner-name" id="datePartnerName">Анна</div>
                        <div class="affection-wrap">
                            <div class="bar"><div class="fill" id="affectionFill" style="width:50%;"></div></div>
                            <span class="label" id="affectionLabel">50%</span>
                        </div>
                    </div>
                    
                    <!-- Диалог между именем и вариантами -->
                    <div class="date-chat-wrapper" id="dateChatWrapper">
                        <div class="date-chat" id="dateChat"></div>
                    </div>
                    
                    <!-- Варианты ответа НАД персонажем (чуть меньше) -->
                    <div class="date-choices-wrapper" id="dateChoicesWrapper"></div>
                </div>
                
                <button class="btn-reset" id="resetGame">🔄 Начать заново</button>
            </div>

            <!-- СЦЕНА 6: КОМНАТА -->
            <div id="scene6" class="hidden" style="flex:1; display:flex; flex-direction:column; min-height:0;">
                <div class="room-bg" id="roomBg"></div>
                <div class="room-overlay"></div>
                <div class="room-content">
                    <div class="room-top-bar">
                        <img id="roomAvatarSmall" class="room-avatar-small" src="assets/girl1.png" alt="">
                        <div class="room-info-text">
                            <div class="room-partner-name" id="roomPartnerName">Анна</div>
                            <div class="room-status">💕 Идеальное свидание</div>
                        </div>
                        <span class="room-hearts">💗</span>
                    </div>
                    <div class="room-chat-wrapper" id="roomChatWrapper">
                        <div class="room-chat" id="roomChat">
                            <div class="room-msg system">🕯️ Вы в уединённой обстановке... Атмосфера накаляется...</div>
                        </div>
                    </div>
                    <div class="room-choices-wrapper" id="roomChoicesWrapper"></div>
                </div>
                <div class="room-affection-bar-wrap">
                    <div class="room-affection-inner">
                        <span class="aff-icon">🔥</span>
                        <div class="aff-bar"><div class="aff-fill" id="roomAffectionFill" style="width:100%;"></div></div>
                        <span class="aff-value" id="roomAffectionValue">100%</span>
                    </div>
                </div>
                <button class="btn-room-reset" id="resetFromRoom">🔄 Начать заново</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            console.log('[APP] Tantan v2.0');

            let gameData = null;

            let state = {
                step: 1,
                gender: null,
                style: 'style1',
                likedIndex: 0,
                likedList: [],
                currentPartner: null,
                currentLocationId: null,
                locationDialogIndex: 0,
                affection: 50,
                chatStep: 0,
                chatDone: false,
                roomDialogIndex: 0,
                roomAffection: 100,
                selectedLocationIndex: 0
            };

            const scenes = {
                scene1: document.getElementById('scene1'),
                scene2: document.getElementById('scene2'),
                scene3: document.getElementById('scene3'),
                scene4: document.getElementById('scene4'),
                scene5: document.getElementById('scene5'),
                scene6: document.getElementById('scene6')
            };
            const mainTopBar = document.getElementById('mainTopBar');
            const clockDisplay = document.getElementById('clockDisplay');

            function getPartners() {
                if (!gameData?.partners) return [];
                return gameData.partners[state.gender === 'male' ? 'male' : 'female'] || [];
            }

            function getLocations() {
                return gameData?.locations || [];
            }

            function getNpc(npcId) {
                if (!gameData?.npcs) return null;
                return gameData.npcs[npcId] || null;
            }

            function getLocationDialogs(npcId, locationId) {
                const npc = getNpc(npcId);
                if (!npc?.dialogs) return null;
                if (npc.dialogs[locationId]) return npc.dialogs[locationId];
                const keys = Object.keys(npc.dialogs);
                return keys.length > 0 ? npc.dialogs[keys[0]] : null;
            }

            function getChatFlow() {
                if (!gameData?.chatFlow) return [];
                return gameData.chatFlow[state.gender === 'male' ? 'male' : 'female'] || [];
            }

            function getRoomDialogs() {
                if (!gameData?.roomDialogs) return [];
                return gameData.roomDialogs[state.gender === 'male' ? 'male' : 'female'] || [];
            }

            function getPersonalityLabel(personality) {
                const map = {
                    romantic: '💕 Романтик',
                    creative: '🎨 Креативный',
                    adventurous: '🔥 Авантюрист',
                    calm: '😌 Спокойный',
                    energetic: '⚡ Энергичный'
                };
                return map[personality] || '💕 Романтик';
            }

            function updateClock() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                clockDisplay.textContent = h + ':' + m;
            }
            setInterval(updateClock, 1000);
            updateClock();

            function showScene(id) {
                Object.keys(scenes).forEach(k => scenes[k].classList.toggle('hidden', k !== id));
                if (id === 'scene5' || id === 'scene6') {
                    mainTopBar.style.display = 'none';
                    document.getElementById('app').style.borderRadius = '0';
                    document.getElementById('app').style.border = 'none';
                    document.getElementById('app').style.boxShadow = 'none';
                    document.getElementById('app').style.padding = '0';
                    document.getElementById('app').style.background = id === 'scene6' ? '#1a0a1a' : '#0d0d20';
                } else {
                    mainTopBar.style.display = 'flex';
                    document.getElementById('app').style.borderRadius = '36px';
                    document.getElementById('app').style.border = '1px solid #222244';
                    document.getElementById('app').style.boxShadow = '0 20px 60px rgba(0,0,0,0.95)';
                    document.getElementById('app').style.padding = '10px 12px 12px';
                    document.getElementById('app').style.background = '#111122';
                }
                state.step = parseInt(id.replace('scene', ''));
            }

            function scrollToBottom(element) {
                if (element) {
                    element.scrollTop = element.scrollHeight;
                }
            }

            // ----- СЦЕНА 1 -----
            const mainAvatar = document.getElementById('mainAvatar');
            const toScene2Btn = document.getElementById('toScene2');
            const styleImgs = {
                male: { style1: 'assets/boy1.png', style2: 'assets/boy2.png', style3: 'assets/boy3.png' },
                female: { style1: 'assets/girl1.png', style2: 'assets/girl2.png', style3: 'assets/girl3.png' }
            };

            function updateAvatar() {
                if (!state.gender || !state.style) return;
                mainAvatar.src = styleImgs[state.gender]?.[state.style] || '';
                mainAvatar.style.display = 'block';
                mainAvatar.nextElementSibling.style.display = 'none';
            }

            document.querySelectorAll('#scene1 .gender-selector button').forEach(b => b.addEventListener('click', function() {
                state.gender = this.dataset.gender;
                document.querySelectorAll('#scene1 .gender-selector button').forEach(x => x.classList.remove('active-male', 'active-female'));
                this.classList.add(state.gender === 'male' ? 'active-male' : 'active-female');
                updateAvatar();
                checkEnabled();
            }));

            document.querySelectorAll('#scene1 .style-selector button').forEach(b => b.addEventListener('click', function() {
                document.querySelectorAll('#scene1 .style-selector button').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                state.style = this.dataset.style;
                updateAvatar();
                checkEnabled();
            }));

            function checkEnabled() {
                if (state.gender && state.style) {
                    toScene2Btn.classList.add('enabled');
                    toScene2Btn.disabled = false;
                } else {
                    toScene2Btn.classList.remove('enabled');
                    toScene2Btn.disabled = true;
                }
            }

            toScene2Btn.addEventListener('click', () => {
                if (!state.gender || !state.style) return;
                state.step = 2;
                state.likedIndex = 0;
                state.likedList = [];
                document.getElementById('matchCount').textContent = '0';
                showScene('scene2');
                renderTinder();
            });

            // ----- СЦЕНА 2 -----
            function renderTinder() {
                const p = getPartners();
                if (!p?.length) return;
                const partner = p[state.likedIndex % p.length];
                document.getElementById('tinderAvatar').src = partner.avatar || '';
                document.getElementById('tinderName').textContent = `${partner.name || '?'}, ${partner.age || '?'}`;
                let d = '';
                if (partner.job) d += `<span class="job-badge">💼 ${partner.job}</span>`;
                if (partner.zodiac) d += `<span class="badge">${partner.zodiac}</span>`;
                if (partner.city) d += `<span class="city-badge">📍 ${partner.city}</span>`;
                if (partner.personality) d += `<span class="personality-badge">${getPersonalityLabel(partner.personality)}</span>`;
                document.getElementById('tinderDesc').innerHTML = d || `<span>${partner.desc || ''}</span>`;
                document.getElementById('matchCount').textContent = state.likedList.length;
            }

            document.getElementById('tinderLike').addEventListener('click', () => {
                const p = getPartners();
                if (!p?.length) return;
                const partner = p[state.likedIndex % p.length];
                if (!state.likedList.some(x => x.id === partner.id)) state.likedList.push(partner);
                state.likedIndex++;
                renderTinder();
            });

            document.getElementById('tinderDislike').addEventListener('click', () => {
                state.likedIndex++;
                renderTinder();
            });

            document.getElementById('toChat').addEventListener('click', () => {
                if (!state.likedList.length) { alert('Выбери кого-нибудь ❤️'); return; }
                state.currentPartner = state.likedList[0];
                state.step = 3;
                showScene('scene3');
                initChat();
            });

            // ----- СЦЕНА 3: ЧАТ -----
            const chatMessages = document.getElementById('chatMessages');
            const chatMessagesWrapper = document.getElementById('chatMessagesWrapper');
            const chatRepliesWrapper = document.getElementById('chatRepliesWrapper');
            const toLocationsBtn = document.getElementById('toLocations');

            function initChat() {
                state.chatStep = 0;
                state.chatDone = false;
                toLocationsBtn.classList.remove('visible');
                document.getElementById('chatPartnerAvatar').src = state.currentPartner.avatar || '';
                document.getElementById('chatPartnerName').textContent = state.currentPartner.name || '';
                const f = getChatFlow();
                if (!f || !f.length) {
                    chatMessages.innerHTML = '<div class="message theirs">Нет диалогов</div>';
                    return;
                }
                chatMessages.innerHTML = `<div class="message theirs">${f[0].theirs}</div>`;
                renderChatReplies(0);
                scrollToBottom(chatMessagesWrapper);
            }

            function renderChatReplies(s) {
                const f = getChatFlow();
                if (!f) return;

                chatRepliesWrapper.innerHTML = '';

                if (s >= f.length) {
                    chatMessages.innerHTML += '<div class="message theirs">✨ Договорились! Выбирай место ✨</div>';
                    toLocationsBtn.classList.add('visible');
                    state.chatDone = true;
                    scrollToBottom(chatMessagesWrapper);
                    return;
                }

                f[s].replies.forEach((r, i) => {
                    const b = document.createElement('button');
                    b.className = 'chat-reply-btn';
                    b.textContent = r;
                    b.addEventListener('click', () => {
                        chatMessages.innerHTML += `<div class="message mine">${r}</div>`;
                        chatRepliesWrapper.innerHTML = '';
                        const n = s + 1;
                        if (n < f.length) {
                            const typingMsg = document.createElement('div');
                            typingMsg.className = 'message typing';
                            typingMsg.textContent = 'Печатает...';
                            chatMessages.appendChild(typingMsg);
                            scrollToBottom(chatMessagesWrapper);
                            setTimeout(() => {
                                if (typingMsg.parentNode) typingMsg.remove();
                                chatMessages.innerHTML += `<div class="message theirs">${f[n].theirs}</div>`;
                                renderChatReplies(n);
                                scrollToBottom(chatMessagesWrapper);
                            }, 1500);
                        } else {
                            chatMessages.innerHTML += '<div class="message theirs">✨ Договорились! Выбирай место ✨</div>';
                            toLocationsBtn.classList.add('visible');
                            state.chatDone = true;
                            scrollToBottom(chatMessagesWrapper);
                        }
                        scrollToBottom(chatMessagesWrapper);
                    });
                    chatRepliesWrapper.appendChild(b);
                });
                scrollToBottom(chatMessagesWrapper);
            }

            toLocationsBtn.addEventListener('click', () => {
                if (!state.chatDone) return;
                state.step = 4;
                showScene('scene4');
                renderLocations();
            });

            // ----- СЦЕНА 4: ЛОКАЦИИ -----
            function renderLocations() {
                const c = document.getElementById('locationCatalog');
                const l = getLocations();
                if (!l?.length) return;
                c.innerHTML = '';
                l.forEach((loc, i) => {
                    const d = document.createElement('div');
                    d.className = 'catalog-item' + (i === state.selectedLocationIndex ? ' selected' : '');
                    let icon = '📍';
                    if (loc.name.includes('☕')) icon = '☕';
                    else if (loc.name.includes('🍽️') || loc.name.includes('ресторан') || loc.name.includes('суши')) icon = '🍽️';
                    else if (loc.name.includes('🎬') || loc.name.includes('кино')) icon = '🎬';
                    else if (loc.name.includes('🌳') || loc.name.includes('парк')) icon = '🎢';
                    else if (loc.name.includes('🎨') || loc.name.includes('галерея')) icon = '🎨';
                    else if (loc.name.includes('🎵') || loc.name.includes('джаз')) icon = '🎵';
                    else if (loc.name.includes('🏖️') || loc.name.includes('набережная')) icon = '🌊';
                    else if (loc.name.includes('🎳')) icon = '🎳';
                    else if (loc.name.includes('🌿') || loc.name.includes('сад')) icon = '🌿';

                    let tagsHtml = '';
                    if (loc.tags && loc.tags.length) {
                        tagsHtml = `<div class="tags">${loc.tags.map(t => `<span>#${t}</span>`).join('')}</div>`;
                    }

                    d.innerHTML = `
                        <img src="${loc.bg || ''}" onerror="this.style.display='none'">
                        <div class="info">
                            <h4>${loc.name}</h4>
                            <p>${loc.desc || ''}</p>
                            ${tagsHtml}
                        </div>
                        <span class="location-icon">${icon}</span>
                    `;
                    d.addEventListener('click', () => {
                        state.selectedLocationIndex = i;
                        document.querySelectorAll('.catalog-item').forEach(el => el.classList.remove('selected'));
                        d.classList.add('selected');
                    });
                    c.appendChild(d);
                });
            }

            document.getElementById('toDate').addEventListener('click', () => {
                const locs = getLocations();
                const loc = locs?.[state.selectedLocationIndex] || locs?.[0];
                state.currentLocationId = loc?.id || 'cafe';
                state.locationDialogIndex = 0;
                state.affection = 50;
                state.step = 5;
                showScene('scene5');
                updateAffectionUI();
                document.getElementById('dateChat').innerHTML = '';
                document.getElementById('dateChoicesWrapper').innerHTML = '';
                renderDateScene();
            });

            // ----- СЦЕНА 5: СВИДАНИЕ -----
            const dateChat = document.getElementById('dateChat');
            const dateChatWrapper = document.getElementById('dateChatWrapper');
            const dateChoicesWrapper = document.getElementById('dateChoicesWrapper');
            const dateAvatarFull = document.getElementById('dateAvatarFull');

            function updateAffectionUI() {
                const v = Math.min(100, Math.max(0, state.affection));
                const fill = document.getElementById('affectionFill');
                fill.style.width = v + '%';
                document.getElementById('affectionLabel').textContent = v + '%';
                if (v < 30) fill.style.background = '#ff4444';
                else if (v < 60) fill.style.background = '#ffaa44';
                else fill.style.background = 'linear-gradient(90deg, #ff4d8a, #ff6b9d)';
            }

            function renderDateScene() {
                const partner = state.currentPartner;
                const locs = getLocations();
                const loc = locs?.find(l => l.id === state.currentLocationId) || locs?.[0] || {};

                document.getElementById('dateBg').style.backgroundImage = `url('${loc.bg || ''}')`;
                dateAvatarFull.src = partner?.avatar || '';
                document.getElementById('datePartnerName').textContent = partner?.name || '';

                const dialogs = getLocationDialogs(partner?.id, state.currentLocationId);
                dateChoicesWrapper.innerHTML = '';

                if (!dialogs || state.locationDialogIndex >= dialogs.length) {
                    let end = state.affection >= 70 ?
                        (state.gender === 'male' ? '💖 Ты её зацепил!' : '💖 Ты его зацепила!') :
                        state.affection >= 45 ? '❤️ Неплохо!' : '💔 Уходит...';
                    dateChat.innerHTML += `<div class="date-msg system">🏁 ${end}</div>`;
                    scrollToBottom(dateChatWrapper);
                    setTimeout(() => goToRoom(), 1500);
                    return;
                }

                const d = dialogs[state.locationDialogIndex];
                const react = state.affection >= 65 ? '😍 Заинтересован(а)!' :
                    state.affection >= 45 ? '😊 Улыбается.' :
                    state.affection >= 25 ? '😐 В сторону.' : '😒 Разочарован(а).';

                const contextEmoji = loc.name.includes('🎬') ? '🎥' : 
                                    loc.name.includes('☕') ? '☕' :
                                    loc.name.includes('🍽️') ? '🍷' :
                                    loc.name.includes('🌳') ? '🎢' : '💫';
                dateChat.innerHTML += `<div class="date-msg theirs">${d.text} ${contextEmoji} ${react}</div>`;
                scrollToBottom(dateChatWrapper);

                d.choices.forEach((choice, i) => {
                    const b = document.createElement('button');
                    b.className = 'date-choice-btn';
                    b.textContent = choice.text;

                    b.addEventListener('click', () => {
                        const fullText = choice.full || choice.text;
                        dateChat.innerHTML += `<div class="date-msg mine">${fullText}</div>`;
                        state.affection = Math.min(100, Math.max(0, state.affection + (choice.effect || 0)));
                        updateAffectionUI();
                        state.locationDialogIndex++;
                        dateChoicesWrapper.innerHTML = '';
                        scrollToBottom(dateChatWrapper);
                        renderDateScene();
                    });
                    dateChoicesWrapper.appendChild(b);
                });
                scrollToBottom(dateChoicesWrapper);
            }

            // ----- СЦЕНА 6: КОМНАТА -----
            const roomChat = document.getElementById('roomChat');
            const roomChatWrapper = document.getElementById('roomChatWrapper');
            const roomChoicesWrapper = document.getElementById('roomChoicesWrapper');

            function goToRoom() {
                state.step = 6;
                state.roomDialogIndex = 0;
                state.roomAffection = 100;
                showScene('scene6');
                document.getElementById('roomBg').style.backgroundImage = "url('assets/room.png')";
                document.getElementById('roomAvatarSmall').src = state.currentPartner?.avatar || '';
                document.getElementById('roomPartnerName').textContent = state.currentPartner?.name || '';
                document.getElementById('roomAffectionFill').style.width = '100%';
                document.getElementById('roomAffectionValue').textContent = '100%';
                roomChat.innerHTML = '<div class="room-msg system">🕯️ Вы в уединённой обстановке... Атмосфера накаляется...</div>';
                roomChoicesWrapper.innerHTML = '';
                renderRoomScene();
            }

            function renderRoomScene() {
                const dialogs = getRoomDialogs();
                if (!dialogs?.length) return;
                roomChoicesWrapper.innerHTML = '';

                if (state.roomDialogIndex >= dialogs.length) {
                    roomChat.innerHTML += `<div class="room-msg system">💫 Волшебный вечер... Это начало чего-то прекрасного ✨</div>`;
                    scrollToBottom(roomChatWrapper);
                    return;
                }

                const d = dialogs[state.roomDialogIndex];
                const react = state.roomAffection >= 90 ? '🔥 Искры повсюду!' : '💕 Очень тепло...';
                roomChat.innerHTML += `<div class="room-msg theirs">${d.text} ${react}</div>`;
                scrollToBottom(roomChatWrapper);

                const choiceTexts = d.choices || d;
                const effects = d.effects || [];
                choiceTexts.forEach((choice, i) => {
                    const b = document.createElement('button');
                    b.className = 'room-choice-btn';
                    const shortText = typeof choice === 'string' ? choice : (choice.text || choice);
                    b.textContent = shortText;
                    const effect = effects[i] || 0;

                    b.addEventListener('click', () => {
                        const fullText = typeof choice === 'string' ? choice : (choice.full || choice.text || choice);
                        roomChat.innerHTML += `<div class="room-msg mine">${fullText}</div>`;
                        state.roomAffection = Math.min(100, Math.max(0, state.roomAffection + effect));
                        document.getElementById('roomAffectionFill').style.width = state.roomAffection + '%';
                        document.getElementById('roomAffectionValue').textContent = state.roomAffection + '%';
                        state.roomDialogIndex++;
                        roomChoicesWrapper.innerHTML = '';
                        scrollToBottom(roomChatWrapper);
                        renderRoomScene();
                    });
                    roomChoicesWrapper.appendChild(b);
                });
                scrollToBottom(roomChoicesWrapper);
            }

            // ----- СБРОС -----
            function resetGame() {
                state = {
                    step: 1,
                    gender: null,
                    style: 'style1',
                    likedIndex: 0,
                    likedList: [],
                    currentPartner: null,
                    currentLocationId: null,
                    locationDialogIndex: 0,
                    affection: 50,
                    chatStep: 0,
                    chatDone: false,
                    roomDialogIndex: 0,
                    roomAffection: 100,
                    selectedLocationIndex: 0
                };
                showScene('scene1');
                document.querySelectorAll('#scene1 .gender-selector button').forEach(b => b.classList.remove('active-male', 'active-female'));
                document.querySelectorAll('#scene1 .style-selector button').forEach(b => b.classList.remove('active'));
                document.querySelector('#scene1 .style-selector button[data-style="style1"]').classList.add('active');
                toScene2Btn.classList.remove('enabled');
                toScene2Btn.disabled = true;
                mainAvatar.src = 'assets/boy1.png';
                document.getElementById('affectionFill').style.width = '50%';
                document.getElementById('affectionLabel').textContent = '50%';
                document.getElementById('dateChat').innerHTML = '';
                document.getElementById('dateChoicesWrapper').innerHTML = '';
                document.getElementById('roomChat').innerHTML = '';
                document.getElementById('roomChoicesWrapper').innerHTML = '';
                document.getElementById('toLocations').classList.remove('visible');
            }

            document.getElementById('resetGame').addEventListener('click', resetGame);
            document.getElementById('resetFromRoom').addEventListener('click', resetGame);

            // ----- ЗАГРУЗКА ДАННЫХ -----
            async function loadGameData() {
                try {
                    const response = await fetch('data.json');
                    if (!response.ok) throw new Error('Файл не найден');
                    const data = await response.json();
                    if (data.partners && data.locations && data.npcs) {
                        gameData = data;
                        console.log('[DATA] Загружено из data.json');
                        console.log('[DATA] NPC:', Object.keys(data.npcs).length);
                        console.log('[DATA] Локаций:', data.locations.length);
                    } else {
                        throw new Error('Неверная структура');
                    }
                } catch (e) {
                    console.warn('[DATA] Ошибка загрузки:', e);
                    alert('Не удалось загрузить data.json. Проверь, что файл находится в той же папке, что и index.html');
                }
            }

            // ----- ИНИЦИАЛИЗАЦИЯ -----
            loadGameData().then(() => {
                showScene('scene1');
                document.querySelector('#scene1 .style-selector button[data-style="style1"]').classList.add('active');
                state.style = 'style1';
                updateAvatar();
            });

        })();
    </script>
</body>
</html>
